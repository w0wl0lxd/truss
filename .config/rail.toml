targets = ["wasm32-unknown-unknown"]

[unify]
detect_unused = true
remove_unused = false
prune_dead_features = false
detect_undeclared_features = true
fix_undeclared_features = false
msrv = false

[release]
tag_prefix = "v"
tag_format = "{crate}-{prefix}{version}"
push = false
create_github_release = false
require_release_notes = false

[change-detection]
infrastructure = [
  ".github/**",
  "scripts/**",
  "justfile",
  "Justfile",
  "*.sh",
  ".pre-commit-config.yaml",
  "deny.toml",
]
unknown_file_policy = "strict"

[run]
default_profile = "local"

[run.profile.local]
surfaces = ["test"]

[run.profile.ci]
surfaces = ["build", "test", "docs"]
