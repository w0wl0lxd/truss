# Nextest configuration
# See: https://nexte.st/docs/configuration

nextest-version = { required = "0.9.88", recommended = "0.9.88" }

[profile.default]
test-threads = "num-cpus"
fail-fast = true
retries = 1
slow-timeout = { period = "60s", terminate-after = 2 }
status-level = "pass"
final-status-level = "flaky"

[profile.default.junit]
path = "nextest/junit.xml"

[profile.ci]
test-threads = "num-cpus"
fail-fast = false
retries = 2
slow-timeout = { period = "120s", terminate-after = 3 }
status-level = "all"
final-status-level = "all"

[profile.quick]
test-threads = "num-cpus"
fail-fast = true
retries = 0
status-level = "fail"

[profile.audit]
test-threads = "num-cpus"
fail-fast = false
retries = 0
slow-timeout = { period = "120s", terminate-after = 1 }
status-level = "all"
final-status-level = "all"
