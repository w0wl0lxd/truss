name: ci

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  rust:
    name: check clippy test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: neutralize local cargo config for CI
        # Repo .cargo/config.toml pins sccache + clang/mold for NixOS host builds.
        # GitHub runners do not have those tools; override to stock toolchain.
        run: |
          mkdir -p .cargo
          printf '%s\n' \
            '[build]' \
            '# rustc-wrapper intentionally unset for GitHub Actions' \
            '[target.x86_64-unknown-linux-gnu]' \
            'linker = "cc"' \
            'rustflags = []' \
            > .cargo/config.toml
          cat .cargo/config.toml
      - name: fmt
        run: cargo fmt --all -- --check
      - name: check
        run: cargo check --all-features
      - name: clippy
        run: cargo clippy --all-features -- -D warnings
      - name: nextest
        uses: taiki-e/install-action@nextest
      - name: test
        run: cargo nextest run --workspace --no-fail-fast
