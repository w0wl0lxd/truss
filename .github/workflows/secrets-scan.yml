name: secrets-scan

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Full history scan
        if: >-
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
      - name: PR range scan
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          gitleaks git --log-opts="${BASE}..${HEAD}" --config .gitleaks.toml --redact --verbose --exit-code 1

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.88.30
        with:
          path: ./
          extra_args: --only-verified --exclude-paths=.trufflehog-exclude

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit --deny warnings
